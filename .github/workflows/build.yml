# 实习生管理系统 — 跨平台构建 CI (使用官方 tauri-action)
#
# 触发:
#   - push tag v*     → 全平台构建 + Auto Draft Release
#   - workflow_dispatch → 全平台构建 + (draft | publish) Release
#   - push main       → 全平台构建, 仅 Artifacts (不发 Release)
#
# 产物:
#   - Windows: NSIS (.exe)
#   - Linux:   .deb / .AppImage

name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "README.md"
      - ".gitignore"
  workflow_dispatch:
    inputs:
      release_edition:
        description: "发布形式 (仅对 tag 触发 + dispatch, main push 不发)"
        required: false
        default: draft
        type: choice
        options:
          - draft
          - publish

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm ci
        if: github.event_name != 'pull_request'

      - name: Build frontend
        run: npm run build
        if: github.event_name != 'pull_request'

      # 单一步, 根据触发类型决定是否发 release
      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tag → 用 tag 名字; main push → 空 (action 不发 release, 只生成 artifacts)
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "实习生管理系统 ${{ github.ref_name }}"
          releaseBody: "自动发布:Windows NSIS 安装包 + Linux .deb / AppImage"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: .
