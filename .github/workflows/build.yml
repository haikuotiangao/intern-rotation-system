# 实习生管理系统 — 跨平台构建 CI
#
# 触发方式:
#   - 往 main 分支 push 代码（包含 tag 或特定路径触发）
#   - 手动 workflow_dispatch（在 GitHub Actions 页面点击"Run workflow"）
#
# 产物:
#   - Windows: NSIS 安装包
#   - Linux: .deb + .AppImage
#   每个产物上传到 GitHub Actions 的 Artifact，可在运行记录的 Summary 页下载。

name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "README.md"
      - ".gitignore"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Windows NSIS ──────────────────────────────────────────────
  build-windows:
    name: Windows (NSIS)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Install system dependencies (Tauri 2 CLI)
        run: npm install -g @tauri-apps/cli

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (Windows)
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: 实习生管理系统_Windows_x64
          path: src-tauri/target/release/bundle/nsis/*.exe
          compression-level: 0

  # ─── Linux (deb + AppImage) ────────────────────────────────────
  build-linux:
    name: Linux (deb + AppImage)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-unknown-linux-gnu

      - name: Install system dependencies (Tauri 2 Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libgdk-pixbuf2.0-dev \
            xorg-dev \
            libxdo-dev \
            libasound2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (Linux)
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: 实习生管理系统_Linux_x64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          compression-level: 0