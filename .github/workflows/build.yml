# 实习生管理系统 — 跨平台构建 CI (手写流程)
#
# 之前用过 tauri-apps/tauri-action@v0, 在 GitHub Actions 上 1 秒 fail,
# 看不到 stderr。改回稳重手写流程。
#
# 触发:
#   - push tag v*      → 全平台构建 + GitHub Release(Draft by default)
#   - workflow_dispatch → 仅构建 + 上传 Artifacts
#   - push main          → 仅构建 + 上传 Artifacts
#
# 产物:
#   - Windows: NSIS (.exe)
#   - Linux:   .deb / .AppImage

name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "README.md"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows NSIS
            os: windows-latest
            artifact_name: 实习生管理系统_Windows_x64
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - platform: Linux (deb + AppImage)
            os: ubuntu-22.04
            artifact_name: 实习生管理系统_Linux_x64
            artifact_path: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        # CI 跳过 tsc 类型检查 (本地 dev 周期 + 手动 'npx tsc --noEmit' 守),
        # 减少 GitHub Actions windows runner 上冷启动的不可预期失败。
        run: npm run build:ci

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libgdk-pixbuf2.0-dev \
            xorg-dev \
            libxdo-dev \
            libasound2-dev

      - name: Install Rust toolchain (Windows)
        if: matrix.os == 'windows-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rust-src

      - name: Install Rust toolchain (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
          components: rust-src

      - name: Cache Cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            cargo-${{ matrix.os }}-

      - name: Build Tauri bundle
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          NO_STRIP: "true"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: "实习生管理系统 ${{ github.ref_name }}"
          body: |
            自动发布:Windows NSIS 安装包 + Linux .deb / AppImage.
            CI: ${{ github.workflow }} @ ${{ github.sha }}
          draft: true
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
