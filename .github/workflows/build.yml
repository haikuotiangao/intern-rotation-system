# 实习生管理系统 — 跨平台构建 & 发版
#
# 学习自 farion1231/cc-switch release.yml 的成熟模式：
#   - matrix 仅 build (不发布)；publish-release 是独立 job
#   - 各平台 runner 用 pnpm tauri build (我们用 npm tauri build, 同理)
#   - Prepare assets 阶段, 把 bundle 改名统一为 release-assets/
#   - Publish Release 是 ubuntu 上跑 collect-all-artifacts -> softprops/action-gh-release
#   - concurrency 控制, 避免同 tag 多次 push 造成 outlier run
#
# 触发:
#   - push tag v*       → 跨平台 build + publish Release (Draft)
#   - workflow_dispatch → 仅 build + upload Artifacts
#   - push main          → 仅 build + upload Artifacts
#
# 产物:
#   - Windows NSIS .exe
#   - Linux .deb + .AppImage

name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ github.ref_name || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows NSIS
            os: windows-latest
            bundle: nsis
            asset_glob: src-tauri/target/release/bundle/nsis/*.exe
          - label: Linux (deb + AppImage)
            os: ubuntu-22.04
            bundle: appimage,deb
            asset_glob: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 锁 LTS 22 (避开 GitHub 2025-09 起把 Node 20 → 24 强转的 ABI 警告)
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl wget file patchelf \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          # webkit 版本兼容: GitHub 各 ubuntu image 任选其一
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Install frontend deps + build
        # 显式分两步, 把前端构建和 tauri 构建分开诊断。
        # CI 上 frontend npm run build:ci 在 GitHub runners 偶发 30s 内 exit 1,
        # 之前都和 tauri 混在一步, 看不到 stderr。
        shell: bash
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE"
          echo "== Checkout dir: $(pwd) =="
          ls -la
          echo "== Install npm deps =="
          npm ci
          echo "node=$(node -v) npm=$(npm -v)"
          echo "== Build frontend (vite only, no tsc) =="
          if ! npm run build:ci > frontend-build.log 2>&1 ; then
            echo "::error::frontend build failed; tail of log:"
            tail -50 frontend-build.log >&2
            exit 1
          fi
          echo "== Frontend artifacts =="
          find dist -maxdepth 2 -type f | head -20

      - name: Build Tauri
        # 不调用 beforeBuildCommand (空字符串), 只复用上面已构建的 dist/
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE"
          echo "NODE=$(node -v) NPM=$(npm -v) CWD=$(pwd)"
          echo "== Pre-built frontend dist/ exists ? =="
          ls dist/ | head -10
          # 使用独立 --no-bundle 选项不存在的 tauri 2 — 我们直接 tauri build
          npx tauri build --bundles ${{ matrix.bundle }}

      - name: List built bundles (debug)
        if: always()
        shell: bash
        run: |
          echo "== Bundle dir list =="
          find src-tauri/target -maxdepth 5 -type f \( -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" \) 2>/dev/null || true
          echo "== artifacts dir =="

      - name: Upload built bundles as workflow artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ runner.os }}
          path: ${{ matrix.asset_glob }}
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Download all built bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: release-assets
          merge-multiple: true

      - name: Verify collected assets
        run: |
          set -euxo pipefail
          ls -la release-assets
          if [ -z "$(ls -A release-assets)" ]; then
            echo "::error::no bundle artifacts collected"
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "实习生管理系统 ${{ github.ref_name }}"
          body: |
            自动发布:Windows NSIS 安装包 + Linux .deb / AppImage。
            CI: ${{ github.workflow }} @ ${{ github.sha }}
          draft: true
          prerelease: false
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
