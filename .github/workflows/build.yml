# 实习生管理系统 — 跨平台构建 CI (使用官方 tauri-action)
#
# 触发方式:
#   - 推送带 v* 格式的 tag (例 v1.0.0) → 自动构建+发布 GitHub Release(全平台产物)
#   - 手动 workflow_dispatch
#   - 向 main 分支 push(只上传 Artifacts,不发布 Release)
#
# 产物:
#   - Windows: NSIS 安装包 (.exe)
#   - Linux:   .deb (x86_64)
#   Tag 推送时会自动追加到 GitHub Release 页面; 普通 push 只在 Actions 的 Artifacts 区域。

name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "README.md"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: write   # 创建 Release 需要

jobs:
  build:
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""

    steps:
      - uses: actions/checkout@v4

      # 用官方 tauri-action,内部一站式安装 Node / Rust / 系统依赖 / 执行 build
      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tag 推送时打 tagName 形如 v1.2.3,否则留空 (只生成 Artifacts)
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "实习生管理系统 ${{ github.ref_name }}"
          releaseBody: "自动发布:Windows NSIS 安装包 + Linux .deb / AppImage"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
