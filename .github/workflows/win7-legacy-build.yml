name: release-win7-legacy

on:
  push:
    branches:
      - feat/win7-legacy
    tags:
      - "v*-legacy7"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    name: debug
    runs-on: windows-2022
    timeout-minutes: 10
    steps:
      - name: Print context
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "RunId=${{ github.run_id }}"
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: True
        run: echo "yes"
