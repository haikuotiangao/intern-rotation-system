# 实习生管理系统 — Win7 Legacy 专属构建 CI
#
# 这份 workflow 仅在 `feat/win7-legacy` 分支有效。它的目标是产出
# 能在 **Windows 7 SP1 x64** 运行的安装包。Tauri 2 主分支有另一份
# .github/workflows/build.yml,勿冲撞。
#
# 触发:
#   - push tag v*-legacy7 (例 v1.0.0-legacy7)
#   - workflow_dispatch (手动静态)
#
# 产物 (NSIS): 实习生管理系统 Win7_v{x.y.z}_x64.exe
#        (portable): 实习生管理系统 Win7_v{x.y.z}_x64_portable.exe
#
# 后端技术栈: Electron 22 + better-sqlite3 + 原 frontend React build
# (dist/index.html) + preload 桥接 Tauri 2 invoke API 到 Electron IPC.
# 前端代码 0 改动。

name: release-win7-legacy

on:
  push:
    branches:
      - feat/win7-legacy
    tags:
      - "v*-legacy7"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-win7-legacy-${{ github.ref_name || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: build-win7-x64
    runs-on: windows-2019  # 2019 是 GitHub 最后一个支持 Win7 toolchain 的镜像
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # 注意: Win7 products 测试只能在我 Win7 PC 上做,
      # 不能在 CI runner 里 (Win Server 2019 > Win7 — GUI 测试 太重).
      # CI 仅走 build pipeline; UI 验证 需 user 在 Win7 SP1 本机 上 install.

      - name: Build frontend (root)
        shell: pwsh
        run: |
          if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }
          npm ci --no-audit
          npm run build

      - name: Install electron-workspace deps
        shell: pwsh
        run: |
          cd electron-workspace
          if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }
          npm install --no-audit
          # 重建 better-sqlite3 native 为了 installed electron version
          npx electron-builder install-app-deps

      - name: Build & sign (electron-builder NSIS + portable)
        shell: pwsh
        env:
          # 跳转 Win7 signature — Tauri Win7 不会生效; 此处无 signer
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          cd electron-workspace
          npx electron-builder --win nsis portable --x64 --publish never

      - name: List release artifacts
        shell: pwsh
        if: always()
        run: |
          Write-Host "== electron-workspace/release =="
          if (Test-Path electron-workspace/release) {
            Get-ChildItem electron-workspace/release -Recurse | ForEach-Object {
              $size = "{0:N2}" -f ($_.Length / 1MB)
              Write-Host ("  {0} ({1} MB)" -f $_.FullName, $size)
            }
          } else {
            Write-Host "  (no release dir)"
          }

      - name: Upload release artifacts
        shell: pwsh
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: win7-legacy-release
          path: electron-workspace/release/
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref_name, '-legacy7')
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Download win7 release assets
        uses: actions/download-artifact@v4
        with:
          name: win7-legacy-release
          path: release-assets

      - name: Verify
        run: |
          set -euxo pipefail
          ls -laR release-assets
          if [ -z "$(find release-assets -type f 2>/dev/null)" ]; then
            echo "::error::no win7 artifacts collected"
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "实习生管理系统 Win7 Legacy ${{ github.ref_name }}"
          body: |
            ⚠️ **仅用于 Windows 7 SP1 (x64) 装机**。
            Tauri 2 依赖 WebView2 runtime, Microsoft 不发布 Win7 版本, 所以走 Electron 22 (最后支持 Win7 SP1 的 Electron LTS)。
            该产物 **Electron 22 已 EOL** — 强烈建议 [升级主机到 Win10/11](https://support.microsoft.com/en-us/windows) 后 使用 [主分支的跨平台 release](https://github.com/haikuotiangao/intern-rotation-system/releases) 。

            ### 安装前环境依赖
            1. **VC++ Redistributable 2015-2022 (x64)** — better-sqlite3 native 必需
            2. **KB3033929** — Win7 SHA-256 patch (vcredist/electron 装载会检查)
            3. **KB4490628** — TLS 1.2 patch (HTTPS 各资产 装载依赖)

            ### 资产架构
            | 形态 | 文件 | 备注 |
            | --- | --- | --- |
            NSIS 安装包 (`*.exe`) | `实习生管理系统 Win7_v${VERSION}_x64.exe` | 推荐,可装 / 卸 |
            便携绿版 (`_portable.exe`) | `实习生管理系统 Win7_v${VERSION}_x64_portable.exe` | 不需装,解压加载

            业务逻辑与前端 UI 与 Tauri 主分支一致 — 老年机 上 享 跨 Win10/11 同期 代码。
          draft: false
          prerelease: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
